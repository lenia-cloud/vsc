<html>
  <head>
    
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
      nav a{
        background-color: antiquewhite;
        ...animation: link-animation 4s ;
      }

      nav a:visited{
        
        color: brown;
      }

      nav a:link{
        color: orangered;
      }

      @keyframes link-animation{
        0%{
          background-color: red;
          color: aqua;
        }
        25%{
          background-color: yellow;
          color: blue;
        }
        50%{
          background-color: greenyellow;
          color: orange;
        }
        100%{
          background-color: orange;
          color: white;
        }
        
      }

      h1{
        position: absolute;
        
       
      }

      header{
        height:200px;
        background-image: url(thumbnails/evan_almighty.jpg), url(thumbnails/waterwalk.jpg);
        background-repeat: no-repeat;
        background-position: left, right ;
        
        background-size: contain;
        margin: calc(2 * 10px);
        border:50px black solid;
        border-image: url(thumbnails/amen.jpeg) 25;
      }

      @keyframes title-bounce{
        0%{
          top: 0%;
        }
        
        100%{
          bottom: 0%;
        }
      }

      img{
        max-width: 100%;
      }

      @media screen and (max-width:600px) {
        body{
          background-color: chocolate;
        }
        
      }

      @media screen and (max-width: 812px) and (min-width: 600px) {
        body{
          background-color: lightcoral;
        }
        
      }
   
  

    </style>

  </head>
  <body>

</html>
