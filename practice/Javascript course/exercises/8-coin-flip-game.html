<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coin Flip Game</title>
</head>

<body>


  <button onclick="
    playGame('heads');
    
    ">
    Heads
  </button>

  <button onclick="
    playGame('tails')
    ">
    Tails
  </button>

  <script>
   
    const score = JSON.parse(localStorage.getItem('score')) || {
        wins:0,
        losses: 0
      } 

    function playGame(guess){
      const computerGuess = Math.random();
      const result = computerGuess < 0.5 ?'heads':'tails';

      console.log(guess === result ? 'You win' :'You lose');

      if (guess === result) {
        score.wins++;
      } else {
        score.losses++;
      }

      console.log(score);
      console.log(`Wins: ${score.wins} Losses: ${score.losses}`)
      localStorage.setItem('score', JSON.stringify(score));
      
    }

      

  </script>
</body>

</html>
