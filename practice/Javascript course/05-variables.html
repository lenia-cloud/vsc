<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Variables
  </title>
</head>

<body>
  
  <script>
    let var1 = 3;
    console.log(var1+3);

    const calculation = 2+2;
    console.log(calculation);
    console.log(calculation+var1);

    const result = calculation+var1;
    console.log(result);

    let message = 'hello';
    console.log(message);

    var1 = 5;
    console.log(var1);

    var1=var1+1;
    console.log(var1);

    console.log(typeof message);

  </script>
</body>

</html>
