<!DOCTYPE html>
<html>
  <head>
    <title>Display blocks and Inline blocks</title>

    <style>
      .name,
      .email{
        display:block;
        margin-bottom:5px;
      }

      .survey{
        display:inline-block;
        width:200px;
        vertical-align: middle;
      }

      img{
        width: 200px;
        opacity:0.8;
        border-radius: 10px ;
        margin-bottom: 10px;

      }

      .search{
        border:none;
        border-radius:30px;
        width:500px;
        margin-top:5px;
        padding-top:10px;
        padding-bottom:10px;
        padding-left:14px;
        box-shadow: 0 1px 6px rgb(0, 0, 0, 0.2);
        font-size: 16px;
        font-family:Arial;
        margin-bottom:10px;


      }


      div{
        text-align:center;
      }

      button{
        background-color: rgb(245, 245, 245);
        border:none;
        border-radius:4px;
        padding-left:10px;
        padding-right:10px;
        padding-top:10px;
        padding-bottom:10px;
        margin-right:5px;
        box-shadow:0 0 6px rgba(0, 0, 0, 0.194);
      
      }

    </style>
  </head>

  <body>




    <input type="text", placeholder="Name" class="name">
    <input type="email", placeholder="Email" class="email">

    <br>

    <p class="survey">
      Thanks for chatting with our customer spport. Would you like to take the survey?
    </p>
    <button>Yes</button>
    <button>No</button>
    <br><br><br><br>

    <div>
      <img src="amazing grace.jpeg" >
    </div>

    <div>
      <input type="text" placeholder="How sweet is your sound?" class="search">

    </div>

    <div>
      <button>Moses</button>
      <button>Paul's journey</button>
    </div>

    

  </body>


</html>
