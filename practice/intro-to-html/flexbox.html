<!DOCTYPE html>
<html>
  <head>
    <title>Flexbox practice</title>

  </head>

  <body style="
  padding-bottom: 1000px;">
    <div style="
    
      display:flex;
      flex-direction:row;">
      <div style="
        background-color: lightblue;">div 1 text</div>
      <div style="
      background-color: lightgreen;">div 2 <p>text</p></div>
    </div>

    <div style="
    margin-top:30px;
      display:flex;
      flex-direction:row;">
      <div style="
        background-color: lightblue;
        width:100px;">100px</div>
      <div style="
      flex:1;
      background-color: lightgreen;">flex 1 <p>text</p></div>
    </div>

      <div style="
    margin-top:30px;
      display:flex;
      flex-direction:row;">
      <div style="
        background-color: lightblue;
        width:100px;">100px</div>
      <div style="
      flex:1;
      background-color: lightgreen;">flex 1 </div>
      <div style="
        background-color: lightblue;
        width:100px;
        flex:2;"
        >flex: 2</div>
    </div>

     <div style="
    margin-top:30px;
      display:flex;
      flex-direction:row;">
      <div style="
      flex:1;
      background-color: lightblue;">flex 1 </div>
      <div style="
        background-color: lightgreen;
        width:100px;">100px</div>
      
      <div style="
        background-color: lightblue;
        width:100px;
        flex:2;"
        >flex: 2</div>

        
    </div>


    <div style="
    margin-top:30px;
      display:flex;
      flex-direction:row;
      justify-content: center ;
      height: 70px;
      border-width:1px;
      border-style: solid;
      border-color:gray;">
      <div style="
      width:100px;
      background-color: lightblue;">100px </div>
      <div style="
        background-color: lightgreen;
        width:100px;">100px</div>
      
      <div style="
        background-color: lightblue;
        width:100px;
      "
        >100px</div>
        </div>

        <div style="
      margin-top:30px;
      display:flex;
      flex-direction:row;
      justify-content: space-between;
      height: 70px;
      border-width:1px;
      border-style: solid;
      border-color:gray;">
      <div style="
      width:100px;
      background-color: lightblue;">100px </div>
      <div style="
        background-color: lightgreen;
        width:100px;">100px</div>
      
      <div style="
        background-color: lightblue;
        width:100px;
      "
        >100px</div>
        </div>


        <div style="
      margin-top:30px;
      display:flex;
      flex-direction:row;
      justify-content: space-between;
      height: 70px;
      border-width:1px;
      border-style: solid;
      border-color:gray;
      align-items: center ;
      "
      
      >
      <div style="
      width:100px;
      background-color: lightblue;">100px </div>
      <div style="
        background-color: lightgreen;
        width:100px;">100px</div>
      
      <div style="
        background-color: lightblue;
        width:100px;
      "
        >100px</div>
        </div>

        

        

        
  </body>
</html>

<!--flexbox is more flexible than css grid(as in the name).
 you can change the position of the text and it will move 
 with its dimensions of flexxx-->
