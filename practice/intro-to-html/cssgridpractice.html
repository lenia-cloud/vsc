<!DOCTYPE html>
<html>
  <head>
    <title>Css Grid Practice 11</title>

  </head>

  <body>
    <div style="
      display:grid;
      grid-template-columns: 200px 75px;
      margin-bottom: 10px;
      ">
      <div style="background-color: lightblue;">200px</div>
      <div style="background-color: lightsalmon;">75px</div>

    </div>

    <div style="
      display:grid;
      grid-template-columns: 50px 1fr 75px;
      margin-bottom: 10px;
      ">
      <div style="background-color: lightblue;">col1</div>
      <div style="background-color: lightsalmon;">col2</div>
      <div style="background-color: lightblue;">col3</div>

    </div>

    
    <div style="
      display:grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      margin-bottom: 10px;
      row-gap: 10px;
      column-gap: 20px;
      ">
        <div style="background-color: lightblue;">col1</div>
        <div style="background-color: lightsalmon;">col2</div>
        <div style="background-color: lightgoldenrodyellow;">col3</div>
        <div style="background-color: lightgreen;">col4</div>
        <div style="background-color: lightblue;">col1</div>
        <div style="background-color: lightsalmon;">col2</div>
        <div style="background-color: lightgoldenrodyellow;">col3</div>
        <div style="background-color: lightgreen;">col4</div>

    </div>




  </body>

</html>
