<!DOCTYPE html>
<html>
  <head>
    <style>
      /* 12 e*/
      .container{
        box-shadow: 1px 1px 5px gray;
        width:300px;
        border-radius:8px;
        background-color: rgba(96, 236, 190, 0.984);
        margin-bottom: 50px;
        
      }
      .flexbox{
        display:flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        padding-left:8px;
        padding-right:8px;
        padding-top:5px;
        padding-bottom:5px;

      }

      .category,
      .alerts{
        font-family: Tahoma;
        font-size:14px;
        color: darkcyan;
        
      }

      .alerts{
        background-color:darkcyan;
        color: rgba(96, 236, 190, 0.984);
        padding-left: 5px;
        padding-right: 5px;
        padding-top: 5px;
        padding-bottom: 5px;
        border-radius: 10px;
      }


      /* 12 f*/

      .box{
        display: flex;
        flex-direction: row;
        background-color:rgb(206, 70, 206);
        height:50px;
        align-items: center;
        justify-content: space-between;
        font-family:sans-serif;
        color: whitesmoke;
        font-weight: bold;
        padding-left: 10px;
        padding-right: 10px;
        margin-bottom: 50px;

      }

      .left-section{
        width:60px;
        margin-right: 20px;
      }


      .search-bar{
        width:500px;
        border:none;
        padding-left: 12px;
        padding-right: 5px;
        padding-top: 8px;
        padding-bottom: 8px;
        border-radius: 16px;
      }

      .right-section{
        background-color: rgb(206, 70, 206);
        border-width: 1.5px;
        color: whitesmoke;
        border-color: whitesmoke;
        border-style: solid;
        border-radius: 2px;
        font-family: sans-serif;
        font-weight: bold;
        margin-left: 20px;
        padding-top: 5px;
        padding-bottom: 5px;
        padding-left: 8px;
        padding-right: 8px;
      }
      
      /*12g*/

      .container2{
        
        background-color: rgb(203, 101, 203);
        width:350px;
        padding-top: 10px;
        padding-bottom: 5px;
        border-radius: 8px;

      }

      .account{
        display: flex;
        flex-direction: row;
        align-items: center;
        margin-bottom: 20px;
        
        
      }

      .info{
        width:200px;
      }

      .name,
      .animal,
      .state{
        margin-top: 0;
        margin-bottom: 0;
        font-family: sans-serif;
        font-size: 12px;
        line-height: 16px;
        color: white;
      }
      .name{
        font-weight: bold;
      }
      .animal{
        color: pink;
        font-size: 13px;
      }
      .state{
        color: pink;
      }


      .pfp{
        width:50px;
        height:50px;
        object-fit: cover;
        object-position:top;
        border-radius: 25px;
        margin-top: 5px;
        margin-left: 5px;
        margin-right:15px
      }

      .follow{
       color: rgb(255, 184, 241);
       background-color: rgb(236, 24, 155);
       font-weight: bold;
       border:none;
       padding-top: 8px;
       padding-bottom: 8px;
       padding-left: 8px;
       padding-right: 8px;
       border-radius:18px;
      }

    </style>

  </head>

  <body>
    <!--12e-->
    <div class="container">

    <div class="flexbox">
      <div class="category">Home</div>
      <div class="alerts">14</div>
    </div>

    <div class="flexbox">
      <div class="category">Notifications</div>
      <div class="alerts">3</div>
    </div>

    <div class="flexbox">
      <div class="category">Messages</div>
      <div class="alerts">12</div>
    </div>

   </div>



<!--12 part f-->

   <div class="box">
    <div class="left-section">Home</div>
    <input type="text" placeholder="Search" class="search-bar">
    <button class="right-section">Download</button>
   </div>



<!--12g-->
   <div class="container2">

    <div class="account">
      <img src="thumbnails/7a2c028503a05275cc9029ba4ea1048a.jpg" class="pfp">
      <div class="info">
        <p class="name">Oliver</p>
        <p class="animal">the cat</p>
        <p class="state">Popular</p>
      </div>
      <button class="follow">Follow</button>
    </div>

    <div class="account">
      <img src="thumbnails/15c2a1fda7d7249bd979f5fdeda89663.jpg" class="pfp">
      <div class="info">
        <p class="name">Mimi</p>
        <p class="animal">sleepy cat</p>
        <p class="state">Popular</p>
      </div>
      <button class="follow">Follow</button>
    </div>

    <div class="account">
      <img src="thumbnails/3f537bc818b06c54342d9f347ea162a4.jpg" class="pfp">
      <div class="info">
        <p class="name">Rex</p>
        <p class="animal">happy bulldog</p>
        <p class="state">Popular</p>
      </div>
      <button class="follow">Follow</button>
    </div>

   </div>



  </body>



</html>
