<!DOCTYPE html>
<html>
  <head>
    <title>Images</title>
    <style>
      .pic{
        width:200px;
        border-radius:15px;
      }
      .pic1{
        width:150px;
        height:150px;
        object-fit:cover;
        object-position: center;
        
      }
      .pic2{
        width:150px;
        height:150px;
        border-radius:75px;
        object-fit: cover;
        object-position: center;  
      }
      .search1{
        font-size: 16px;
        width:200px;
        height:20px;
        border-radius: 8px;
        border-style: solid;
        border-width:1px;
        border-color: rgb(200, 200, 200);
        padding-top:10px;
        padding-bottom: 10px;
        padding-left: 15px;
        padding-right: 15px;
      }

      .search2{
        border: none;
        width:500px;
        height:28px;
        border-radius:30px;
        color: 200, 200, 200;
        font-size: 16px;
        padding-right: 15px;
        padding-left: 15px;
        padding-top: 12px;
        padding-bottom: 12px;
        box-shadow: 0 1px 9px rgb(103, 98, 98);
        margin-left:15px;


      }

      .linkedin{
        border-width:2px;
        border-radius:5px;
        border-style: solid;

        width:400px;
        height:30px; }
        

        .text{
          font-family: Arial;
          font-size: 16px;
          color:gray;

        }

        .button{
          background-color: rgb(59, 126, 233);
          color: aliceblue;
          border: none;
          width: 400px;
          border-radius: 25px;
          padding-top:14px;
          padding-bottom:14px;
          font-size:20px;
          transition: box-shadow 0.1s;


        }
        .button:hover{
          box-shadow:1px 2px 5px rgb(90, 87, 87);
        }

        .pfp{
          width:50px;
          height:50px;
          object-fit:cover;
          border-radius: 25px;
          vertical-align: middle;
        }

        .tweetbox{
          border:none;
          width:300px;
          margin-left:15px;
          font-size:18px;
          vertical-align: middle;
        }

        .tweet{
          background-color:rgb(29, 155, 240);
          color:white;
          border:none;
          font-weight:bold;
          padding-top:8px;
          padding-bottom:8px;
          padding-left:16px;
          padding-right:16px;
          border-radius:30px;
          font-size: 16px;
          vertical-align: middle;

        }

        .box{
          border:none;
          box-shadow:0 0 6px rgba(0, 0, 0, 0.3);
          border-radius:6px;
          width:500px;
          padding-top:10px;
          padding-bottom: 10px;
          padding-left:12px;
          margin-left:12px;

        }

    </style>
  </head>

  <body>
    <img class="pic" src="flower.jpeg">
    <br>
    <img class="pic1" src="flower.jpeg">
    <br>
    <img class="pic2" src="flower.jpeg">
    <br>
    <input type="text" placeholder="Search" class="search1">
    <input type="text" placeholder="Search Google or type a URL" class="search2">
    <br>


    <p class="text">Email</p>
    <input type="email" class="linkedin">
    <p class="text">By clicking Agree & Join, you agree to the Privacy Policy.</p>
    <button class="button">Agree & Join </button>
    <br><br><br>

    <div class="box">
      <img class="pfp" src="flower.jpeg">
      <input type="text" placeholder="What's happening?" class="tweetbox">
      <button class="tweet">Tweet</button>

    </div>
    
  </body>

</html>
