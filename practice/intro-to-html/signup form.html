<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="css/signup form.css">
    <title>SignUp forms</title>

  </head>

  <body>
    <input type="text" placeholder="First name" class="firstname">
    <input type="text" placeholder="Last name" class="lastname">
    <input type="email" placeholder="Email" class="email">
    <button class="signup">
      Sign Up
    </button>
    <br>
    <br><br><br>

    <p class="ubertext">
      Request a ride now
    </p>
    <input type="text" placeholder="Enter pickup location" class="pickup">
    <input type="text" placeholder="Enter destination" class="destination">
    <br>
    <button class="request">
      Request now
    </button>

    <button class="schedule">
      Schedule for later
    </button>


  </body>

</html>
